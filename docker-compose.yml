# docker-compose.yml
# APEX PREDATOR NEO v666 – Orquestração Multi-Machine
# Scanner (Curitiba) → Redis Pub/Sub → Executors (Singapore / Tokyo)

version: "3.9"

services:
  redis:
    image: redis:7.2-alpine
    container_name: apex666_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --tcp-keepalive 60
      --save ""
      --appendonly no
      --hz 100
    volumes:
      - redis_data:/data
    networks:
      - apex_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_scanner
    env_file: .env
    environment:
      - APEX_ROLE=scanner
      - APEX_REGION=curitiba
      - SPOOFHUNTER_URL=http://spoofhunter:8011
      - ANTIRUG_URL=http://antirug:8012
      - NEWTONIAN_URL=http://newtonian:8013
      - NARRATIVE_URL=http://narrative:8014
      - ECONOPREDATOR_URL=http://econopredator:8015
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M

  singapore_executor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_singapore
    env_file: .env
    environment:
      - APEX_ROLE=executor
      - APEX_REGION=singapore
    depends_on:
      redis:
        condition: service_healthy
      scanner:
        condition: service_started
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M

  tokyo_executor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_tokyo
    env_file: .env
    environment:
      - APEX_ROLE=executor
      - APEX_REGION=tokyo
    depends_on:
      redis:
        condition: service_healthy
      scanner:
        condition: service_started
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M


  spoofhunter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_spoofhunter
    env_file: .env
    command: ["uvicorn", "services.spoofhunter:app", "--host", "0.0.0.0", "--port", "8011"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  antirug:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_antirug
    env_file: .env
    command: ["uvicorn", "services.antirug_v3:app", "--host", "0.0.0.0", "--port", "8012"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  newtonian:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_newtonian
    env_file: .env
    command: ["uvicorn", "services.newtonian:app", "--host", "0.0.0.0", "--port", "8013"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  narrative:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_narrative
    env_file: .env
    command: ["uvicorn", "services.narrative:app", "--host", "0.0.0.0", "--port", "8014"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  econopredator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_econopredator
    env_file: .env
    command: ["uvicorn", "services.econopredator:app", "--host", "0.0.0.0", "--port", "8015"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs


  openclaw_gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex666_openclaw_gateway
    env_file: .env
    command: ["uvicorn", "services.openclaw_gateway:app", "--host", "0.0.0.0", "--port", "8090"]
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - apex_net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./third_party:/app/third_party

networks:
  apex_net:
    driver: bridge

volumes:
  redis_data:
